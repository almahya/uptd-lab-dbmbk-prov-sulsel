<!DOCTYPE html>
<html lang="id">
<head>

    <!-- Tailwind CSS CDN -->

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

</head>
<body class="bg-white">
    <div id="root"></div>

    <script type="text/babel">

        // Custom Icon Component using Lucide

            useEffect(() => {

            }, []);

            const galleryItems = [
                { id: 1, src: '1000425883.jpg', title: 'Pengujian Material 1', category: 'Laboratorium' },
                { id: 2, src: '1000425882.jpg', title: 'Pengujian Lapangan 2', category: 'Lapangan' },
                { id: 3, src: '1000425879.jpg', title: 'Analisa Agregat', category: 'Laboratorium' },
                { id: 4, src: '1000425880.jpg', title: 'Dokumentasi Sampel', category: 'Laboratorium' },
                { id: 5, src: '1000425881.jpg', title: 'Uji Beton Keras', category: 'Laboratorium' },

                                    </h2>
                                    <p className="text-lg text-slate-600 max-w-xl leading-relaxed font-medium">

                                    <div className="flex flex-col sm:flex-row space-y-4 sm:space-y-0 sm:space-x-4">

                                        <img src="hero.png" alt="Hero" className="w-full h-full object-cover" />
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Layanan */}

                        <div className="max-w-7xl mx-auto px-4">

                                ))}

                        </div>
                    </section>

                    {/* Galeri */}
                    <section id="galeri" className="py-24 bg-slate-50">
                        <div className="max-w-7xl mx-auto px-4">

                                {galleryItems.map((item) => (
                                    <div key={item.id} className="group relative bg-white rounded-[2rem] overflow-hidden shadow-lg">
                                        <div className="aspect-[4/3] overflow-hidden">
                                            <img src={item.src} alt={item.title} className="w-full h-full object-cover group-hover:scale-110 transition duration-700" />
                                        </div>
                                        <div className="p-6">
                                            <span className="text-yellow-600 font-black text-[10px] uppercase tracking-widest mb-1 block">{item.category}</span>
                                            <h4 className="text-slate-900 font-black text-sm uppercase tracking-tight">{item.title}</h4>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* Tarif */}
                    <section id="tarif" className="py-24 bg-white">
                        <div className="max-w-7xl mx-auto px-4">
                            <div className="flex flex-col lg:flex-row justify-between items-end gap-8 mb-12">
                                <div>
                                    <h3 className="text-yellow-600 font-black text-xs uppercase tracking-[0.2em] mb-3 font-bold tracking-widest">Tarif Jasa Layanan</h3>
                                    <h2 className="text-3xl md:text-4xl font-black text-slate-900 uppercase tracking-widest">Daftar Biaya 2026</h2>
                                    <p className="mt-4 text-slate-500 font-medium">Sesuai Perda Prov. Sulsel No. 1 Tahun 2026.</p>
                                </div>
                                <div className="w-full lg:w-96 relative">
                                    <Icon name="search" className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" size={18} />
                                    <input 
                                        type="text" 
                                        placeholder="Cari pengujian..." 
                                        className="w-full pl-12 pr-6 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-yellow-400 font-bold"
                                        value={searchQuery}
                                        onChange={(e) => setSearchQuery(e.target.value)}
                                    />
                                </div>
                            </div>
                            <div className="bg-white rounded-[2.5rem] overflow-hidden border border-slate-200 shadow-xl">
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left">
                                        <thead className="bg-slate-900 text-white uppercase text-[10px] font-black tracking-widest">
                                            <tr>

                                                <th className="px-8 py-6">Satuan</th>

                                        <tbody className="divide-y divide-slate-100 font-bold text-sm text-slate-900 uppercase">

                                                <tr key={item.id} className="hover:bg-yellow-50 transition">

                                                    <td className="px-8 py-5 text-slate-400 italic lowercase">{item.unit}</td>

                                        <div className="p-2 bg-white rounded-2xl"><img src="https://upload.wikimedia.org/wikipedia/commons/e/ea/Coat_of_arms_of_South_Sulawesi.svg" className="h-10 w-auto" /></div>

                                            <h5 className="font-black text-[13px] uppercase text-yellow-400 tracking-widest">PEMERINTAH PROVINSI SULSEL</h5>

                                    <div className="text-left bg-slate-800 p-8 rounded-[2.5rem] border border-slate-700">

                            </div>
                        </div>
                    </footer>
                </div>

        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
