                                    <h2 className="text-3xl md:text-4xl font-black text-slate-900 uppercase tracking-widest">Daftar Biaya 2026</h2>
                                    <p className="mt-4 text-slate-500 font-black uppercase text-[10px] tracking-widest">TARIF RETRIBUSI JASA LABORATORIUM</p>
                                    <p className="text-slate-400 text-[9px] italic uppercase tracking-tighter">(Sesuai Peraturan Daerah Provinsi Sulawesi Selatan Nomor 1 Tahun 2024)</p>
                                </div>
                                <div className="w-full lg:w-96 relative">
                                    <Icon name="search" className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" size={18} />
                                    <input 
                                        type="text" 
                                        placeholder="Cari jenis pengujian..." 
                                        className="w-full pl-12 pr-6 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-yellow-400 font-bold"
                                        value={searchQuery}
                                        onChange={(e) => setSearchQuery(e.target.value)}
                                    />
                                </div>
                            </div>

                            {/* Category Filter Tabs */}
                            <div className="flex flex-wrap gap-2 mb-8 overflow-x-auto pb-4 no-scrollbar">
                                {categories.map(cat => (
                                    <button
                                        key={cat.id}
                                        onClick={() => setActiveTab(cat.id)}
                                        className={`px-6 py-2.5 rounded-full text-[10px] font-black uppercase tracking-widest transition-all ${
                                            activeTab === cat.id 
                                            ? 'bg-yellow-400 text-slate-900 shadow-md border border-yellow-500/20' 
                                            : 'bg-slate-100 text-slate-500 hover:bg-slate-200 border border-slate-200'
                                        }`}
                                    >
                                        {cat.name}
                                    </button>
                                ))}
                            </div>

                            <div className="bg-white rounded-[2.5rem] overflow-hidden border border-slate-200 shadow-xl">
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left">
                                        <thead className="bg-slate-900 text-white uppercase text-[10px] font-black tracking-widest">
                                            <tr>
                                                <th className="px-8 py-6">Jenis Pengujian / Objek Retribusi</th>
                                                <th className="px-8 py-6">Satuan</th>
                                                <th className="px-8 py-6 text-right">Tarif (Rp)</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100 font-bold text-sm text-slate-900 uppercase">
                                            {filteredData.map((item) => (
                                                <tr key={item.id} className="hover:bg-yellow-50 transition-colors">
                                                    <td className="px-8 py-5 leading-tight">{item.name}</td>
                                                    <td className="px-8 py-5 text-slate-400 italic lowercase whitespace-nowrap">{item.unit}</td>
                                                    <td className="px-8 py-5 text-right text-yellow-700 font-black tabular-nums">
                                                        {item.price.toLocaleString('id-ID')},00
                                                    </td>
                                                </tr>
                                            ))}
                                            {filteredData.length === 0 && (
                                                <tr>
                                                    <td colSpan="3" className="px-8 py-20 text-center text-slate-400 italic font-medium uppercase tracking-widest">
                                                        Data pengujian tidak ditemukan
                                                    </td>
                                                </tr>
                                            )}
                                        </tbody>
                                    </table>
                                </div>
                                <div className="p-10 bg-slate-50 border-t border-slate-100 flex items-start space-x-3 text-[10px] text-slate-400 italic uppercase leading-relaxed tracking-wide">
                                    <Icon name="info" size={16} className="text-yellow-500 flex-shrink-0" />
                                    <p>Catatan: Tarif di atas tidak termasuk bahan kimia, akomodasi, transportasi, dan lembur tenaga laboratorium sesuai ketentuan yang berlaku.</p>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Footer */}
                    <footer className="bg-slate-900 py-20 text-white border-t border-slate-800">
                        <div className="max-w-7xl mx-auto px-4 text-left">
                            <div className="flex flex-col md:flex-row justify-between gap-16">
                                <div className="space-y-8 max-w-md">
                                    <div className="flex items-center space-x-5">
                                        <div className="p-2.5 bg-white rounded-2xl shadow-xl border border-slate-100">
                                            <img src="https://upload.wikimedia.org/wikipedia/commons/e/ea/Coat_of_arms_of_South_Sulawesi.svg" className="h-10 w-auto" />
                                        </div>
                                        <div>
                                            <h5 className="font-black text-[13px] uppercase text-yellow-400 tracking-widest leading-none mb-1">PEMERINTAH PROVINSI SULSEL</h5>
                                            <p className="text-[10px] text-slate-500 font-black tracking-widest uppercase">DINAS BINA MARGA & BK</p>
                                        </div>
                                    </div>
                                    <div className="space-y-4">
                                        <p className="text-[11px] text-slate-400 font-bold uppercase tracking-widest leading-relaxed">
                                            Unit Pelaksana Teknis Laboratorium Pengujian Bahan Konstruksi - Melayani dengan Integritas, Akurasi, dan Profesionalisme.
                                        </p>
                                        <div className="flex space-x-4 text-[9px] font-black uppercase tracking-[0.2em] text-slate-600">
                                            <p>Integritas</p>
                                            <p>Akurasi</p>
                                            <p>Transparansi</p>
                                        </div>
                                    </div>
                                </div>
                                <div className="bg-slate-800 p-10 rounded-[3rem] border border-slate-700 shadow-2xl relative overflow-hidden group">
                                    <div className="absolute -top-10 -right-10 w-40 h-40 bg-yellow-400/5 rounded-full blur-3xl group-hover:bg-yellow-400/10 transition"></div>
                                    <h6 className="text-yellow-400 font-black uppercase text-xs tracking-widest mb-8 text-left">Layanan Pengaduan & Informasi</h6>
                                    <div className="space-y-6 text-xs font-bold uppercase tracking-tight text-left">
                                        <a href="https://wa.me/6282192777789" target="_blank" className="flex items-center space-x-4 hover:text-yellow-400 transition group">
                                            <div className="w-10 h-10 bg-yellow-400 rounded-xl flex items-center justify-center text-slate-900 group-hover:scale-110 transition"><Icon name="phone" size={18} /></div>
                                            <div>
                                                <p className="text-[9px] text-slate-500 font-black tracking-widest mb-1">Syahrir (Admin)</p>
                                                <p className="text-sm tracking-widest font-black">0821-9277-7789</p>
                                            </div>
                                        </a>
                                        <div className="flex items-center space-x-4 text-slate-400">
                                            <div className="w-10 h-10 bg-slate-700 rounded-xl flex items-center justify-center"><Icon name="map-pin" size={18} /></div>
                                            <div>
                                                <p className="text-[9px] text-slate-600 font-black tracking-widest mb-1">Lokasi Kantor</p>
                                                <p className="text-[10px] font-bold uppercase leading-relaxed">Baddoka, Makassar, Sulawesi Selatan</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div className="mt-20 pt-10 border-t border-slate-800 flex flex-col md:flex-row justify-between items-center text-[9px] font-black text-slate-600 uppercase tracking-[0.4em] gap-6 text-center md:text-left">
                                <p>&copy; 2026 DINAS BINA MARGA DAN BINA KONSTRUKSI PROVINSI SULAWESI SELATAN. SELURUH HAK CIPTA DILINDUNGI.</p>
                                <div className="flex gap-6">
                                    <span className="hover:text-yellow-400 transition cursor-default">Integritas</span>
                                    <span className="hover:text-yellow-400 transition cursor-default">Profesional</span>
                                </div>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
